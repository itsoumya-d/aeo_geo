  <!-- JSON-LD Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Cognition AI Visibility Engine",

      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "0",
        "highPrice": "399",
        "offerCount": "4"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "156"
      },
      "featureList": [
        "AI Platform Scoring (ChatGPT, Gemini, Claude, Perplexity)",

  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">

      "@context": "https://schema.org",

      "url": "https://cognition.ai",

      ],

        "@type": "ContactPoint",

  <!-- JSON-LD Structured Data: FAQPage -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Generative Engine Optimization (GEO)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GEO is the practice of optimizing your content to be cited and recommended by AI search engines like ChatGPT, Gemini, Claude, and Perplexity. Unlike traditional SEO which focuses on Google rankings, GEO focuses on how LLMs perceive and reference your brand."
          }
        },
        {
          "@type": "Question",
          "name": "How does Cognition AI analyze my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cognition uses real-time crawling to fetch your site content, then analyzes it using vector embeddings to understand how AI models perceive your brand compared to competitors. You get scores across multiple AI platforms and actionable recommendations."
          }
        },
        {
          "@type": "Question",
          "name": "What is Vector Shift Analysis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vector Shift Analysis is Cognition's unique technology that shows how content changes affect your position in the AI's semantic space. When you simulate a rewrite, you can see exactly how it moves your content closer or further from your target keywords and competitors."
          }
        }
      ]
    }
  </script>
